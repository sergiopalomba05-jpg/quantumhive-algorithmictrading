<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuantumHive - Oficina Imperial Virtual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }
    
    #office-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }
    
    #office-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    .ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(26, 26, 46, 0.95);
      border: 2px solid #D4B96A;
      border-radius: 12px;
      padding: 20px;
      max-width: 300px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    .ui-overlay h2 {
      font-size: 18px;
      color: #D4B96A;
      margin-bottom: 15px;
      border-bottom: 1px solid #D4B96A;
      padding-bottom: 10px;
    }
    
    .character-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .character-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin: 5px 0;
      background: rgba(212, 185, 106, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .character-item:hover {
      background: rgba(212, 185, 106, 0.3);
      transform: translateX(5px);
    }
    
    .character-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4B96A, #C9A84C);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .character-info h3 {
      font-size: 13px;
      color: #fff;
    }
    
    .character-info p {
      font-size: 11px;
      color: #aaa;
    }
    
    .ceo-badge {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
    }
    
    .controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }
    
    .control-btn {
      background: rgba(212, 185, 106, 0.2);
      border: 2px solid #D4B96A;
      color: #D4B96A;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .control-btn:hover {
      background: rgba(212, 185, 106, 0.4);
    }
    
    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(26, 26, 46, 0.95);
      border: 2px solid #D4B96A;
      border-radius: 12px;
      padding: 15px 20px;
      min-width: 250px;
    }
    
    .info-panel h3 {
      color: #D4B96A;
      font-size: 14px;
      margin-bottom: 10px;
    }
    
    .info-panel p {
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="office-container">
    <canvas id="office-canvas"></canvas>
    
    <div class="ui-overlay">
      <h2>🏛️ Oficina Imperial</h2>
      <div class="character-list" id="character-list">
        <!-- Characters loaded dynamically -->
      </div>
    </div>
    
    <div class="info-panel">
      <h3>📍 Estado de la Oficina</h3>
      <p id="office-status">Cargando...</p>
    </div>
    
    <div class="controls">
      <button class="control-btn" onclick="toggleMovement()">⏯️ Pausar/Mover</button>
      <button class="control-btn" onclick="addRandomCharacter()">➕ Agregar Agente</button>
      <button class="control-btn" onclick="triggerMeeting()">🤝 Reunión</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('office-canvas');
    const ctx = canvas.getContext('2d');
    
    // Resize canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Characters database
    const ceoCharacters = [
      { name: 'Zeus', role: 'CEO Supremo', emoji: '⚡', color: '#FFD700', myth: 'Dios del cielo y el trueno' },
      { name: 'Atenea', role: 'CEO Estrategia', emoji: '🦉', color: '#4A90D9', myth: 'Diosa de la sabiduría' },
      { name: 'Hermes', role: 'CEO Comunicaciones', emoji: '🪶', color: '#7B68EE', myth: 'Mensajero de los dioses' },
      { name: 'Hefesto', role: 'CEO Fábrica', emoji: '🔨', color: '#CD7F32', myth: 'Dios de la forja' },
      { name: 'Apolo', role: 'CEO Innovación', emoji: '☀️', color: '#FF6B6B', myth: 'Dios de la luz y las artes' }
    ];
    
    const agentCharacters = [
      { name: 'Agente Auditoría', role: 'D1 - Enjambre CFDs', emoji: '🔍', color: '#4CAF50' },
      { name: 'Agente Challenge', role: 'D2 - Fondeo', emoji: '📊', color: '#2196F3' },
      { name: 'Agente Limpieza', role: 'D9 - Mantenimiento', emoji: '🧹', color: '#FF9800' },
      { name: 'Agente Optimizador', role: 'D12 - Crecimiento', emoji: '📈', color: '#9C27B0' },
      { name: 'Agente Formateador', role: 'D3 - Señales', emoji: '📨', color: '#00BCD4' },
      { name: 'Agente Marketing', role: 'D4 - Captación', emoji: '📢', color: '#E91E63' },
      { name: 'Agente QA', role: 'D8 - Fábrica', emoji: '✅', color: '#8BC34A' },
      { name: 'Agente Legal', role: '6A - Legal', emoji: '⚖️', color: '#607D8B' },
      { name: 'Agente Rangos', role: 'D7 - Colmena', emoji: '🏆', color: '#FFC107' },
      { name: 'Agente Visual', role: 'UVID - Design', emoji: '🎨', color: '#E91E63' }
    ];
    
    // Office layout
    const officeZones = [
      { name: 'Sala CEO', x: 0.15, y: 0.15, width: 0.25, height: 0.3, color: 'rgba(212, 185, 106, 0.15)' },
      { name: 'Área Trading', x: 0.45, y: 0.1, width: 0.5, height: 0.35, color: 'rgba(76, 175, 80, 0.15)' },
      { name: 'Fábrica de Bots', x: 0.1, y: 0.5, width: 0.35, height: 0.4, color: 'rgba(33, 150, 243, 0.15)' },
      { name: 'Marketing & Ventas', x: 0.5, y: 0.5, width: 0.4, height: 0.4, color: 'rgba(233, 30, 99, 0.15)' },
      { name: 'Sala de Reuniones', x: 0.3, y: 0.4, width: 0.2, height: 0.2, color: 'rgba(156, 39, 176, 0.15)' }
    ];
    
    // Active characters in office
    let characters = [];
    let isMoving = true;
    let selectedCharacter = null;
    
    // Character class
    class Character {
      constructor(data, isCEO = false) {
        this.name = data.name;
        this.role = data.role;
        this.emoji = data.emoji;
        this.color = data.color;
        this.isCEO = isCEO;
        this.myth = data.myth || '';
        
        // Position
        this.x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
        this.y = Math.random() * canvas.height * 0.8 + canvas.height * 0.1;
        
        // Movement
        this.targetX = this.x;
        this.targetY = this.y;
        this.speed = isCEO ? 1.5 : 2;
        this.size = isCEO ? 50 : 35;
        
        // Animation
        this.bounce = 0;
        this.bounceSpeed = 0.1;
        this.direction = 1;
        
        // Interaction
        this.talkingTo = null;
        this.talkTimer = 0;
      }
      
      update() {
        if (!isMoving) return;
        
        // Bounce animation
        this.bounce += this.bounceSpeed * this.direction;
        if (this.bounce > 5 || this.bounce < -5) this.direction *= -1;
        
        // Move towards target
        if (this.talkingTo) {
          this.talkTimer--;
          if (this.talkTimer <= 0) {
            this.talkingTo = null;
          }
        } else {
          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance > 5) {
            this.x += (dx / distance) * this.speed;
            this.y += (dy / distance) * this.speed;
          } else {
            // Pick new random target
            this.pickNewTarget();
          }
          
          // Random interactions
          if (Math.random() < 0.005) {
            this.initiateInteraction();
          }
        }
        
        // Keep within bounds
        this.x = Math.max(50, Math.min(canvas.width - 50, this.x));
        this.y = Math.max(50, Math.min(canvas.height - 50, this.y));
      }
      
      pickNewTarget() {
        // Pick random zone
        const zone = officeZones[Math.floor(Math.random() * officeZones.length)];
        this.targetX = canvas.width * (zone.x + Math.random() * zone.width);
        this.targetY = canvas.height * (zone.y + Math.random() * zone.height);
      }
      
      initiateInteraction() {
        // Find nearby character
        for (let other of characters) {
          if (other === this) continue;
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < 150) {
            this.talkingTo = other;
            other.talkingTo = this;
            this.talkTimer = 200;
            other.talkTimer = 200;
            break;
          }
        }
      }
      
      draw() {
        const y = this.y + this.bounce;
        
        // Shadow
        ctx.beginPath();
        ctx.ellipse(this.x, this.y + this.size/2 + 10, this.size/2, this.size/4, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fill();
        
        // Body
        ctx.beginPath();
        ctx.arc(this.x, y, this.size, 0, Math.PI * 2);
        const gradient = ctx.createRadialGradient(this.x - this.size/3, y - this.size/3, 0, this.x, y, this.size);
        gradient.addColorStop(0, this.lightenColor(this.color, 30));
        gradient.addColorStop(1, this.color);
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // Border for CEOs
        if (this.isCEO) {
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 4;
          ctx.stroke();
          
          // Crown/halo
          ctx.beginPath();
          ctx.arc(this.x, y - this.size - 10, 15, 0, Math.PI * 2);
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        
        // Emoji
        ctx.font = `${this.size * 0.8}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, this.x, y);
        
        // Name
        ctx.font = 'bold 10px Inter';
        ctx.fillStyle = '#fff';
        ctx.fillText(this.name, this.x, y + this.size + 15);
        
        // Speech bubble if talking
        if (this.talkingTo) {
          this.drawSpeechBubble();
        }
      }
      
      drawSpeechBubble() {
        const bubbleX = this.x + 40;
        const bubbleY = this.y - this.size - 20;
        
        ctx.beginPath();
        ctx.roundRect(bubbleX, bubbleY, 80, 30, 8);
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fill();
        
        ctx.font = '10px Inter';
        ctx.fillStyle = '#333';
        ctx.fillText('💬 Trabajando...', bubbleX + 40, bubbleY + 18);
        
        // Connection line
        ctx.beginPath();
        ctx.moveTo(this.x + this.size, this.y - this.size/2);
        ctx.lineTo(bubbleX, bubbleY + 15);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      
      lightenColor(color, percent) {
        const num = parseInt(color.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) + amt;
        const G = (num >> 8 & 0x00FF) + amt;
        const B = (num & 0x0000FF) + amt;
        return '#' + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
      }
    }
    
    // Initialize office
    function initOffice() {
      // Add CEOs
      ceoCharacters.forEach(ceo => {
        characters.push(new Character(ceo, true));
      });
      
      // Add some agents
      agentCharacters.slice(0, 5).forEach(agent => {
        characters.push(new Character(agent, false));
      });
      
      updateCharacterList();
      updateOfficeStatus();
    }
    
    // Draw office zones
    function drawOfficeZones() {
      officeZones.forEach(zone => {
        ctx.fillStyle = zone.color;
        ctx.fillRect(
          canvas.width * zone.x,
          canvas.height * zone.y,
          canvas.width * zone.width,
          canvas.height * zone.height
        );
        
        ctx.strokeStyle = 'rgba(212, 185, 106, 0.3)';
        ctx.lineWidth = 2;
        ctx.strokeRect(
          canvas.width * zone.x,
          canvas.height * zone.y,
          canvas.width * zone.width,
          canvas.height * zone.height
        );
        
        // Zone label
        ctx.font = 'bold 14px Inter';
        ctx.fillStyle = '#D4B96A';
        ctx.textAlign = 'center';
        ctx.fillText(zone.name, canvas.width * (zone.x + zone.width/2), canvas.height * (zone.y + zone.height/2));
      });
    }
    
    // Draw connections
    function drawConnections() {
      characters.forEach(char => {
        if (char.talkingTo) {
          ctx.beginPath();
          ctx.moveTo(char.x, char.y);
          ctx.lineTo(char.talkingTo.x, char.talkingTo.y);
          ctx.strokeStyle = 'rgba(212, 185, 106, 0.5)';
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      });
    }
    
    // Main animation loop
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw office zones
      drawOfficeZones();
      
      // Draw connections
      drawConnections();
      
      // Update and draw characters
      characters.forEach(char => {
        char.update();
        char.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    // Update character list UI
    function updateCharacterList() {
      const list = document.getElementById('character-list');
      list.innerHTML = '';
      
      characters.forEach((char, index) => {
        const item = document.createElement('div');
        item.className = 'character-item';
        item.onclick = () => selectCharacter(index);
        
        const badge = char.isCEO ? '<span class="ceo-badge">CEO</span>' : '';
        
        item.innerHTML = `
          <div class="character-avatar">${char.emoji}</div>
          <div class="character-info">
            <h3>${char.name} ${badge}</h3>
            <p>${char.role}</p>
          </div>
        `;
        
        list.appendChild(item);
      });
    }
    
    // Update office status
    function updateOfficeStatus() {
      const ceos = characters.filter(c => c.isCEO).length;
      const agents = characters.filter(c => !c.isCEO).length;
      const activeTalks = characters.filter(c => c.talkingTo).length / 2;
      
      document.getElementById('office-status').innerHTML = `
        👑 CEOs: ${ceos}<br>
        🤖 Agentes: ${agents}<br>
        💬 Conversaciones activas: ${activeTalks}
      `;
    }
    
    // Controls
    function toggleMovement() {
      isMoving = !isMoving;
    }
    
    function addRandomCharacter() {
      const availableAgents = agentCharacters.filter(a => 
        !characters.some(c => c.name === a.name)
      );
      
      if (availableAgents.length > 0) {
        const agent = availableAgents[Math.floor(Math.random() * availableAgents.length)];
        characters.push(new Character(agent, false));
        updateCharacterList();
        updateOfficeStatus();
      }
    }
    
    function triggerMeeting() {
      // Make all characters gather in the meeting room
      const meetingZone = officeZones.find(z => z.name === 'Sala de Reuniones');
      characters.forEach(char => {
        char.targetX = canvas.width * (meetingZone.x + Math.random() * meetingZone.width);
        char.targetY = canvas.height * (meetingZone.y + Math.random() * meetingZone.height);
      });
    }
    
    function selectCharacter(index) {
      selectedCharacter = characters[index];
      // Center view on character (optional enhancement)
    }
    
    // Initialize
    initOffice();
    animate();
    
    // Periodic status update
    setInterval(updateOfficeStatus, 1000);
  </script>
</body>
</html>
